name: Rust CI

on:
  push:
    branches:
      - main
    pull_request:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
      runs-on: ubuntu-latest

      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          RUSTFLAGS: "-Dwarnings"

      - name: Run Tests
        run: cargo test --verbose
